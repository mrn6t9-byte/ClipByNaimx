<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ClipByNaim Recorder MP4</title>

<link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

body{
background:#0f2027;
color:white;
font-family:Arial;
text-align:center;
padding:10px;
}

input,button{
width:95%;
padding:14px;
margin:5px;
border-radius:10px;
border:none;
}

video{
width:100%;
border-radius:12px;
margin-top:10px;
}

</style>
</head>

<body>

<h2>ClipByNaim MP4 Recorder</h2>

<input id="link" placeholder="Paste .m3u8 link">

<button id="play">Play</button>
<button id="rec">Start Recording</button>
<button id="stop">Stop</button>

<video
id="v"
class="video-js vjs-default-skin"
controls
autoplay
muted
playsinline
></video>

<p id="msg"></p>

<script>

const videoElement=document.getElementById("v")
const msg=document.getElementById("msg")

const player=videojs("v")

let recorder
let chunks=[]

// PLAY
document.getElementById("play").onclick=()=>{

const url=document.getElementById("link").value.trim()

if(!url){alert("Paste link");return}

if(Hls.isSupported()){

const hls=new Hls({
lowLatencyMode:true,
maxBufferLength:180
})

hls.loadSource(url)
hls.attachMedia(videoElement)

}else{

player.src({
src:url,
type:"application/x-mpegURL"
})

}

msg.innerText="Playing..."

}

// RECORD
document.getElementById("rec").onclick=()=>{

if(!videoElement.captureStream){alert("Browser not supported");return}

chunks=[]

let stream=videoElement.captureStream(30)

recorder=new MediaRecorder(stream,{

mimeType:"video/mp4",

videoBitsPerSecond:12000000

})

recorder.ondataavailable=e=>chunks.push(e.data)

recorder.onstop=()=>{

let blob=new Blob(chunks,{type:"video/mp4"})

let url=URL.createObjectURL(blob)

let a=document.createElement("a")

a.href=url
a.download="ClipByNaim_clip.mp4"
a.click()

msg.innerText="Download finished"

}

recorder.start()

msg.innerText="Recording..."

}

// STOP
document.getElementById("stop").onclick=()=>{

if(recorder) recorder.stop()

}

</script>

</body>
</html>
