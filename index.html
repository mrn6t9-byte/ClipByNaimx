<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClipByNaim Pro Recorder</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{
background:#0f2027;
color:white;
font-family:Arial;
text-align:center;
padding:15px;
}

input,button{
width:95%;
padding:14px;
margin:6px;
border-radius:10px;
border:none;
font-size:16px;
}

button{
background:#00c6ff;
color:black;
font-weight:bold;
}

video{
width:100%;
background:black;
border-radius:12px;
margin-top:10px;
}

#msg{
margin-top:10px;
font-size:14px;
}
</style>
</head>

<body>

<h2>ClipByNaim Pro Recorder</h2>

<input id="link" placeholder="Paste .m3u8 stream link">

<button onclick="play()">Play Stream</button>
<button onclick="startRec()">Start Recording</button>
<button onclick="stopRec()">Stop & Download</button>

<video id="video" controls autoplay muted playsinline></video>

<p id="msg"></p>

<script>

const video=document.getElementById("video")
const msg=document.getElementById("msg")

let recorder
let chunks=[]

// PLAY STREAM
function play(){

let url=document.getElementById("link").value.trim()

if(!url){
alert("Paste .m3u8 link")
return
}

// CORS proxy
url="https://corsproxy.io/?"+url

if(Hls.isSupported()){

let hls=new Hls({
lowLatencyMode:true,
maxBufferLength:120
})

hls.loadSource(url)
hls.attachMedia(video)

}else{

video.src=url

}

msg.innerText="Stream Playing..."

}


// START RECORD
function startRec(){

if(!video.captureStream){
alert("Browser not supported")
return
}

chunks=[]

let stream=video.captureStream()

recorder=new MediaRecorder(stream,{
mimeType:"video/webm;codecs=vp9",
videoBitsPerSecond:10000000
})

recorder.ondataavailable=e=>{
if(e.data.size>0) chunks.push(e.data)
}

recorder.onstop=()=>{

let blob=new Blob(chunks,{type:"video/webm"})
let url=URL.createObjectURL(blob)

let a=document.createElement("a")
a.href=url
a.download="ClipByNaim_record.webm"
a.click()

msg.innerText="Download Ready"
}

recorder.start()

msg.innerText="Recording..."

}


// STOP RECORD
function stopRec(){

if(recorder){
recorder.stop()
msg.innerText="Processing..."
}

}

</script>

</body>
</html>
